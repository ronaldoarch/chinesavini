# Coolify/Railway Nixpacks.
# Se o build falhar no `npm ci` (exit 255) ou no `nix-env`, no Coolify use build por Dockerfile: backend/Dockerfile.
[variables]
NODE_OPTIONS = "--max-old-space-size=4096"

[phases.install]
# Tenta ci (reproduzível); se falhar (lock desalinhado no servidor), cai para install.
cmds = ["npm ci --omit=dev --no-audit --no-fund || npm install --omit=dev --no-audit --no-fund"]
